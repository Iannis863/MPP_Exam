spring.application.name=exam-recap

app.origins.allowed=http://localhost:4200

# H2 In-Memory Database for local testing
spring.datasource.url=jdbc:h2:mem:exam_recap_db;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# Original MySQL config (commented out)
# spring.datasource.url=jdbc:mysql://localhost:3306/exam_recap_db
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.datasource.username=exam_user
# spring.datasource.password=pass

spring.data.jpa.repositories.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


logging.level.org.hibernate=info
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace
logging.level.org.hibernate.stat=debug
logging.level.org.hibernate.SQL_SLOW=info
logging.level.org.hibernate.cache=debug
logging.level.org.example.examrecap=DEBUG
